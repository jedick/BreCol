fit_classifier:
  results_json_template: results/{features}/{name}.json
  experiments:
    - name: cancer_diagnosis_baseline
      overrides:
        task: cancer_diagnosis
        model: baseline

    - name: cancer_diagnosis_knn
      overrides:
        task: cancer_diagnosis
        model: knn

    - name: cancer_diagnosis_svm
      overrides:
        task: cancer_diagnosis
        model: svm

    - name: cancer_diagnosis_random_forest
      overrides:
        task: cancer_diagnosis
        model: random_forest

    - name: cancer_type_baseline
      overrides:
        task: cancer_type
        model: baseline

    - name: cancer_type_knn
      overrides:
        task: cancer_type
        model: knn

    - name: cancer_type_svm
      overrides:
        task: cancer_type
        model: svm

    - name: cancer_type_random_forest
      overrides:
        task: cancer_type
        model: random_forest

# Flat list merged shallowly over the defaults.yaml run_uc_cap_pipeline baseline (feature sets; --feat 1..N).
run_uc_cap_pipeline:
  - { n_uc:  500, n_clusters: 1000, n_cap: 2000 }
  - { n_uc: 1000, n_clusters: 1000, n_cap: 2000 }
  - { n_uc:  500, n_clusters: 2000, n_cap: 2000 }
  - { n_uc: 1000, n_clusters: 2000, n_cap: 2000 }
  - { n_uc:  500, n_clusters: 1000, n_cap: 5000 }
  - { n_uc: 1000, n_clusters: 1000, n_cap: 5000 }
  - { n_uc:  500, n_clusters: 2000, n_cap: 5000 }
  - { n_uc: 1000, n_clusters: 2000, n_cap: 5000 }

extract_embeddings:
  - { num_sets: 5, max_length: 1024 }
  - { num_sets: 5, max_length: 2048 }
  - { num_sets: 5, max_length: 4096 }
  - { num_sets: 5, max_length: 8192 }
  - { num_sets: 5, max_length: 16384 }
  
train_hyenadna:
  results_json_template: results/hyenadna/{task_abbrv}_{name}_{max_length/1024}k_s{seed}.json
  # Extra retries per child after SIGSEGV (signal 11) - often from native code (CUDA / cuDNN / GPU driver)
  sigsegv_retries: 2
  experiments:
    # With 5 sets and 2048 max_length, batch_size=20 uses ca. 15 GB GPU memory
    # Timings to run 3 seeds over 10 epochs (no frozen backbone epochs):
    #   - about 26 minutes for cancer_diagnosis
    #   - about 13 minutes for cancer_type
    #   - about 22 minutes for multitask
    # Estimated total time for 5 multitask experiments with 3 seeds and 25 epochs:
    #   5 * (22) * 3/3 * 25/10 = 275 minutes (4.6 hours)
    - name: best_recipe  # EXPT=1
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
    - name: high_lr  # EXPT=2
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        learning_rate: 1.0e-4
    - name: study_adv  # EXPT=3
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        study_adv_weight: 0.2
    - name: no_backbone_freezing  # EXPT=4
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        freeze_backbone_epochs: 0
        epochs: 20
    - name: loss_ratio_0.5  # EXPT=5
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        loss_ratio: 0.5
    # Increasing max_length experiment grid
    - name: max_length_1024  # EXPT=6 (27 min)
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        max_length: 1024
        batch_size: 40
        epochs: 30
    - name: max_length_2048  # EXPT=7 (63 min)
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        max_length: 2048
        batch_size: 20
        epochs: 30
    - name: max_length_4096  # EXPT=8 (117 min)
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        max_length: 4096
        batch_size: 10
        epochs: 30
    - name: max_length_8192  # EXPT=9 (233 min)
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        max_length: 8192
        batch_size: 5
        epochs: 30
    - name: max_length_16384  # EXPT=10
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        max_length: 16384
        batch_size: 2
        epochs: 30
