fit_classifier:
  results_json_template: results/{features}/{name}.json
  experiments:
    - name: cancer_diagnosis_baseline
      overrides:
        task: cancer_diagnosis
        model: baseline

    - name: cancer_diagnosis_knn
      overrides:
        task: cancer_diagnosis
        model: knn

    - name: cancer_diagnosis_svm
      overrides:
        task: cancer_diagnosis
        model: svm

    - name: cancer_diagnosis_random_forest
      overrides:
        task: cancer_diagnosis
        model: random_forest

    - name: cancer_type_baseline
      overrides:
        task: cancer_type
        model: baseline

    - name: cancer_type_knn
      overrides:
        task: cancer_type
        model: knn

    - name: cancer_type_svm
      overrides:
        task: cancer_type
        model: svm

    - name: cancer_type_random_forest
      overrides:
        task: cancer_type
        model: random_forest

# Flat list merged shallowly over the defaults.yaml run_uc_cap_pipeline baseline (feature sets; --feat 1..N).
run_uc_cap_pipeline:
  - { n_uc: 1000, n_clusters: 2000, n_cap: 5000 }
  - { n_uc: 2000, n_clusters: 2000, n_cap: 5000 }
  - { n_uc: 1000, n_clusters: 5000, n_cap: 5000 }
  - { n_uc: 2000, n_clusters: 5000, n_cap: 5000 }
  - { n_uc: 1000, n_clusters: 2000, n_cap: 10000 }
  - { n_uc: 2000, n_clusters: 2000, n_cap: 10000 }
  - { n_uc: 1000, n_clusters: 5000, n_cap: 10000 }
  - { n_uc: 2000, n_clusters: 5000, n_cap: 10000 }

extract_embeddings:
  - { num_sets: 5, max_length: 1024 }
  - { num_sets: 5, max_length: 2048 }
  - { num_sets: 5, max_length: 4096 }
  - { num_sets: 5, max_length: 8192 }
  - { num_sets: 5, max_length: 16384 }
  
train_hyenadna:
  results_json_template: results/hyenadna/{name}_{max_length/1024}k_s{seed}.json
  experiments:
    # Except as noted, each ct_* experiment takes about 13 minutes to run all seeds (using ca. 15000MiB GPU memory)
    - name: ct_best_recipe  # 1
      overrides:
        task: cancer_type
        random_seed: "0,1,2"
    - name: ct_amp_float16  # 2
      overrides:
        task: cancer_type
        random_seed: "0,1,2"
        amp_dtype: float16
    - name: ct_no_amp  # 3 (ca. 21 minutes)
      overrides:
        task: cancer_type
        random_seed: "0,1,2"
        amp: false
        batch_size: 12
    - name: ct_high_lr  # 4
      overrides:
        task: cancer_type
        random_seed: "0,1,2"
        learning_rate: 1.0e-4
    - name: ct_no_grad_clip  # 5
      overrides:
        task: cancer_type
        random_seed: "0,1,2"
        grad_clip_norm: null
    - name: ct_no_study_balanced  # 6
      overrides:
        task: cancer_type
        random_seed: "0,1,2"
        train_sampler: random
    - name: ct_no_class_weight  # 7
      overrides:
        task: cancer_type
        random_seed: "0,1,2"
        class_weight: none
    - name: ct_head_arch_mlp  # 8
      overrides:
        task: cancer_type
        random_seed: "0,1,2"
        head_arch: mlp
    - name: ct_tuning_val_f1  # 9
      overrides:
        task: cancer_type
        random_seed: "0,1,2"
        tuning_metric: val_f1_weighted
    - name: ct_no_adv_delay  # 10
      overrides:
        task: cancer_type
        random_seed: "0,1,2"
        study_adv_delay_epochs: 0
    - name: ct_no_disc_warmup  # 11
      overrides:
        task: cancer_type
        random_seed: "0,1,2"
        study_disc_warmup_epochs: 0
    - name: ct_no_dann  # 12
      overrides:
        task: cancer_type
        random_seed: "0,1,2"
        study_adv: false
    - name: ct_max_length
      overrides:
        task: cancer_type
        random_seed: "0,1,2"
        max_length: "1024,2048,4096"
