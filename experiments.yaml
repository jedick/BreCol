fit_classifier:
  results_json_template: results/{features}/{name}.json
  experiments:
    - name: cancer_diagnosis_baseline
      overrides:
        task: cancer_diagnosis
        model: baseline

    - name: cancer_diagnosis_knn
      overrides:
        task: cancer_diagnosis
        model: knn

    - name: cancer_diagnosis_svm
      overrides:
        task: cancer_diagnosis
        model: svm

    - name: cancer_diagnosis_random_forest
      overrides:
        task: cancer_diagnosis
        model: random_forest

    - name: cancer_type_baseline
      overrides:
        task: cancer_type
        model: baseline

    - name: cancer_type_knn
      overrides:
        task: cancer_type
        model: knn

    - name: cancer_type_svm
      overrides:
        task: cancer_type
        model: svm

    - name: cancer_type_random_forest
      overrides:
        task: cancer_type
        model: random_forest

# Flat list merged shallowly over the defaults.yaml run_uc_cap_pipeline baseline (feature sets; --feat 1..N).
run_uc_cap_pipeline:
  - { n_uc:  500, n_clusters: 1000, n_cap: 1000 }
  - { n_uc: 1000, n_clusters: 1000, n_cap: 1000 }
  - { n_uc: 1000, n_clusters: 2000, n_cap: 1000 }
  - { n_uc: 1000, n_clusters: 1000, n_cap: 5000 }
  - { n_uc: 1000, n_clusters: 2000, n_cap: 5000 }
  - { n_uc: 1000, n_clusters: 3000, n_cap: 5000 }

train_hyenadna:
  results_json_template: results/hyenadna/{task_abbrv}_{name}_{max_length/1024}k_s{seed}.json
  # Extra retries per child after SIGSEGV (signal 11) - often from native code (CUDA / cuDNN / GPU driver)
  sigsegv_retries: 2
  # Training script supports grids over task and random_seed
  # (e.g. task: [cancer_diagnosis,cancer_type], random_seed: [0,1,2])
  experiments:
    - name: best_recipe  # EXPT=1
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2,3,4]
    - name: high_lr  # EXPT=2
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2,3,4]
        learning_rate: 5.0e-4
    - name: dropout_0.2  # EXPT=3
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2,3,4]
        head_dropout: 0.2
    - name: hidden_256  # EXPT=4
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2,3,4]
        head_hidden: 256
    - name: frozen_backbone  # EXPT=5
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2,3,4]
        freeze_backbone_epochs: 10
        batch_size: 80
    - name: low_lr  # EXPT=6
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2,3,4]
        learning_rate: 1.0e-5
    # Increasing max_length experiment grid (per task, per seed)
    - name: max_length_1024  # EXPT=7
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2,3]
        max_length: 1024
        batch_size: 160
    - name: max_length_2048  # EXPT=8
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2,3]
        max_length: 2048
        batch_size: 80
    - name: max_length_4096  # EXPT=9
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2,3]
        max_length: 4096
        batch_size: 40
    - name: max_length_8192  # EXPT=10
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2,3]
        max_length: 8192
        batch_size: 20
    - name: max_length_16384  # EXPT=11
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2,3]
        max_length: 16384
        batch_size: 10

train_setbert:
  results_json_template: results/setbert/{task_abbrv}_{name}_s{seed}.json
  # Extra retries per child after SIGSEGV (signal 11) - often from native code (CUDA / cuDNN / GPU driver)
  sigsegv_retries: 2
  experiments:
    # Timing for 3 epochs (set_size 100, batch_size 2):
    #   7 minutes for cancer_type
    #   14 minutes for cancer_type
    # Timing for 10 epochs (set_size 350, batch_size 1):
    #   78 minutes for cancer_type
    # Timing for 5 epochs (set_size 350, batch_size 1):
    #   39 minutes for cancer_type
    #   77 minutes for cancer_diagnosis

    # Cancer_type
    - name: head_linear
      overrides:
        random_seed: [0,1]
        task: cancer_type
        head_type: linear
    - name: head_cosine
      overrides:
        random_seed: [0,1]
        task: cancer_type
        head_type: cosine
    - name: cosine_random
      overrides:
        random_seed: [0,1,2]
        task: cancer_type
        head_type: cosine
        weight_init: random
        epochs: 10

    # Cancer_diagnosis
    - name: head_linear
      overrides:
        random_seed: [0,1]
        task: cancer_diagnosis
        head_type: linear
    - name: head_cosine
      overrides:
        random_seed: [0,1]
        task: cancer_diagnosis
        head_type: cosine
    - name: cosine_random
      overrides:
        random_seed: [0,1]
        task: cancer_diagnosis
        head_type: cosine
        weight_init: random
