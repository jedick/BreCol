fit_classifier:
  results_json_template: results/{features}/{name}.json
  experiments:
    - name: cancer_diagnosis_baseline
      overrides:
        task: cancer_diagnosis
        model: baseline

    - name: cancer_diagnosis_knn
      overrides:
        task: cancer_diagnosis
        model: knn

    - name: cancer_diagnosis_svm
      overrides:
        task: cancer_diagnosis
        model: svm

    - name: cancer_diagnosis_random_forest
      overrides:
        task: cancer_diagnosis
        model: random_forest

    - name: cancer_type_baseline
      overrides:
        task: cancer_type
        model: baseline

    - name: cancer_type_knn
      overrides:
        task: cancer_type
        model: knn

    - name: cancer_type_svm
      overrides:
        task: cancer_type
        model: svm

    - name: cancer_type_random_forest
      overrides:
        task: cancer_type
        model: random_forest

# Flat list merged shallowly over the defaults.yaml run_uc_cap_pipeline baseline (feature sets; --feat 1..N).
run_uc_cap_pipeline:
  - { n_uc:  500, n_clusters: 1000, n_cap: 2000 }
  - { n_uc: 1000, n_clusters: 1000, n_cap: 2000 }
  - { n_uc:  500, n_clusters: 2000, n_cap: 2000 }
  - { n_uc: 1000, n_clusters: 2000, n_cap: 2000 }
  - { n_uc:  500, n_clusters: 1000, n_cap: 5000 }
  - { n_uc: 1000, n_clusters: 1000, n_cap: 5000 }
  - { n_uc:  500, n_clusters: 2000, n_cap: 5000 }
  - { n_uc: 1000, n_clusters: 2000, n_cap: 5000 }

extract_embeddings:
  - { num_sets: 5, max_length: 1024 }
  - { num_sets: 5, max_length: 2048 }
  - { num_sets: 5, max_length: 4096 }
  - { num_sets: 5, max_length: 8192 }
  - { num_sets: 5, max_length: 16384 }
  
train_hyenadna:
  results_json_template: results/hyenadna/{task_abbrv}_{name}_{max_length/1024}k_s{seed}.json
  experiments:
    # With 5 sets and 2048 max_length, batch_size=20 uses ca. 15 GB GPU memory
    # Timings to run 3 seeds over 10 epochs:
    #   - about 26 minutes for cancer_diagnosis
    #   - about 13 minutes for cancer_type
    #   - about 22 minutes for multitask
    # Estimated total time for 10 multitask experiments with 3 seeds and 20 epochs:
    #   10 * (22) * 3/3 * 20/10 = 440 minutes (7.3 hours)
    - name: best_recipe  # 1
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
    - name: medium  # 2  (with batch_size = 10 this counts as 2 experiments)
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        max_length: 4096
        batch_size: 10
    - name: no_study_balanced  # 3
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        train_sampler: random
    - name: class_balanced  # 4
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        class_weight: balanced
    - name: high_lr  # 5
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        learning_rate: 1.0e-4
    - name: with_dann  # 6
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        study_adv: true
    - name: head_mlp  # 7
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        head_arch: mlp
    - name: head_mlp_dropout  # 8
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        head_arch: mlp
        head_dropout: 0.1
    - name: head_mlp_freeze  # 9
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        head_arch: mlp
        freeze_backbone_epochs: 5
    - name: 30epochs  # 10
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        epochs: 30
    - name: label_smoothing  # 11
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        label_smoothing: 0.1
    - name: mlp_tr0.6  # 12
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        head_arch: mlp
        task_ratio: 0.6
    - name: mlp_tr0.7_frz5  # 13
      overrides:
        task: "multitask"
        random_seed: "0,1,2"
        head_arch: mlp
        task_ratio: 0.7
        freeze_backbone_epochs: 5
