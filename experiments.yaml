fit_classifier:
  results_json_template: results/{features}/{name}.json
  experiments:
    - name: cancer_diagnosis_baseline
      overrides:
        task: cancer_diagnosis
        model: baseline

    - name: cancer_diagnosis_knn
      overrides:
        task: cancer_diagnosis
        model: knn

    - name: cancer_diagnosis_svm
      overrides:
        task: cancer_diagnosis
        model: svm

    - name: cancer_diagnosis_random_forest
      overrides:
        task: cancer_diagnosis
        model: random_forest

    - name: cancer_type_baseline
      overrides:
        task: cancer_type
        model: baseline

    - name: cancer_type_knn
      overrides:
        task: cancer_type
        model: knn

    - name: cancer_type_svm
      overrides:
        task: cancer_type
        model: svm

    - name: cancer_type_random_forest
      overrides:
        task: cancer_type
        model: random_forest

# Flat list merged shallowly over the defaults.yaml run_uc_cap_pipeline baseline (feature sets; --feat 1..N).
run_uc_cap_pipeline:
  - { n_uc:  500, n_clusters: 1000, n_cap: 1000 }
  - { n_uc: 1000, n_clusters: 1000, n_cap: 1000 }
  - { n_uc: 1000, n_clusters: 2000, n_cap: 1000 }
  - { n_uc: 1000, n_clusters: 1000, n_cap: 5000 }
  - { n_uc: 1000, n_clusters: 2000, n_cap: 5000 }
  - { n_uc: 1000, n_clusters: 3000, n_cap: 5000 }

train_hyenadna:
  results_json_template: results/hyenadna/{task_abbrv}_{name}_{max_length/1024}k_s{seed}.json
  # Extra retries per child after SIGSEGV (signal 11) - often from native code (CUDA / cuDNN / GPU driver)
  sigsegv_retries: 2
  # Timing for max_length 2048, batch_size 20, 5 epochs, 3 seeds:
  # - ca. 13 min for cancer_diagnosis, 7 min for cancer_type
  experiments:
    - name: head_linear
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2]
        head_type: linear
    - name: head_mlp
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2]
        head_type: mlp
    - name: head_cosine
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2]
        head_type: cosine
    # Increasing max_length experiment grid
    - name: max_length_1024  # EXPT=4 (10 min)
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2]
        max_length: 1024
        batch_size: 40
    - name: max_length_2048  # EXPT=5 (20 min)
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2]
        max_length: 2048
        batch_size: 20
    - name: max_length_4096  # EXPT=6 (35 min)
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2]
        max_length: 4096
        batch_size: 10
    - name: max_length_8192  # EXPT=7 (70 min)
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2]
        max_length: 8192
        batch_size: 5
    - name: max_length_16384  # EXPT=8 (140 min)
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1,2]
        max_length: 16384
        batch_size: 2

train_setbert:
  results_json_template: results/setbert/{task_abbrv}_{name}_s{seed}.json
  # Extra retries per child after SIGSEGV (signal 11) - often from native code (CUDA / cuDNN / GPU driver)
  sigsegv_retries: 2
  # Timing for set_size 350, batch_size 1, 5 epochs, 1 seed:
  #   77 minutes for cancer_diagnosis
  #   39 minutes for cancer_type
  experiments:
    - name: head_linear
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1]
        head_type: linear
    - name: head_mlp
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1]
        head_type: mlp
    - name: head_cosine
      overrides:
        task: [cancer_diagnosis, cancer_type]
        random_seed: [0,1]
        head_type: cosine
